<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UserAct 账号活动搜寻台 · 带注释的交互式演示</title>
<style>
/* ============================================================
   UserAct — 企业用户账号活动搜寻台
   交互式演示页（设计令牌取自 useract.css · GLP 绿设计系统）
   ============================================================ */
:root{
  --canvas:#F9FAFC; --surface:#FFFFFF; --surface-2:#FCFDFE; --surface-sunken:#F0F1F3;
  --border:#DDE3EA; --border-strong:#C5CCD3; --hairline:#E8ECF0;
  --ink-900:#34383C; --ink-800:#42464A; --ink-700:#555B61; --ink-600:#656B71;
  --ink-500:#737A82; --ink-400:#9CA3AF; --ink-300:#BCC2C9;
  --primary:#117A56; --primary-700:#0E6346; --primary-600:#15885F;
  --primary-soft:#E6F2EC; --primary-soft-2:#F0F8F4; --primary-ink:#0B5238;
  --ai:#4A90D9; --ai-700:#2F6FB8; --ai-soft:#E4EEFB; --ai-soft-2:#F1F7FE; --ai-ink:#235B9C;
  --ev-direct:#10B050; --ev-direct-soft:rgba(16,176,80,.12);
  --ev-strong:#0095D4; --ev-strong-soft:rgba(0,149,212,.12);
  --ev-weak:#C77F00; --ev-weak-soft:rgba(240,168,0,.16);
  --risk-high:#C83A3A; --risk-high-soft:rgba(200,58,58,.12); --risk-high-ink:#9e2a2a;
  --risk-med:#C77F00; --risk-med-soft:rgba(240,168,0,.15); --risk-med-ink:#8a5a00;
  --risk-low:#737A82; --risk-low-soft:#F0F1F3;
  --ok:#10B050; --ok-soft:rgba(16,176,80,.12); --warn:#C77F00; --warn-soft:rgba(240,168,0,.15);
  --fail:#C83A3A; --fail-soft:rgba(200,58,58,.12); --idle:#737A82; --idle-soft:#F0F1F3;
  --src-entra:#0095D4; --src-entra-soft:#E1F2FB; --src-audit:#9070F0; --src-audit-soft:#EFEAFD;
  --src-es:#1F9587; --src-es-soft:#E0F2EF; --src-vlog:#DB7126; --src-vlog-soft:#FBEEE1;
  --src-profile:#737A82; --src-profile-soft:#F0F1F3;
  --font-sans:"HarmonyOS Sans SC","MiSans","Source Han Sans SC","Microsoft YaHei UI","Microsoft YaHei",sans-serif;
  --font-mono:"JetBrains Mono","SF Mono",Menlo,Monaco,Consolas,monospace;
  --r-sm:4px; --r-md:6px; --r-lg:8px; --r-xl:12px; --r-2xl:16px;
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.03);
  --shadow-md:0 4px 12px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);
  --maxw:1320px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;color:var(--ink-800);font-family:var(--font-sans);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;}
body{background:linear-gradient(180deg,#F7FAF6 0%,#F2F6F1 100%);}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1;}
::selection{background:var(--primary-soft);}
@keyframes ua-fade{from{opacity:0}to{opacity:1}}
@keyframes ua-fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes ua-spin{to{transform:rotate(360deg)}}
@keyframes ua-pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes ua-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes anno-ping{0%{box-shadow:0 0 0 0 rgba(17,122,86,.5)}70%{box-shadow:0 0 0 8px rgba(17,122,86,0)}100%{box-shadow:0 0 0 0 rgba(17,122,86,0)}}
.spin{animation:ua-spin .9s linear infinite;}
svg{flex:none;}

/* ---------- demo chrome (脚手架，区别于产品本体) ---------- */
.demo-bar{position:sticky;top:0;z-index:80;display:flex;align-items:center;gap:18px;
  padding:10px 20px;background:#0c1f18;color:#dcefe3;border-bottom:1px solid #163b2c;}
.demo-bar .brandwrap{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;letter-spacing:.01em;color:#fff;}
.demo-bar .brandwrap .badge{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:999px;
  background:rgba(34,171,118,.2);color:#9ff0c8;font-size:10.5px;font-weight:700;letter-spacing:.06em;}
.stepper{display:flex;align-items:center;gap:6px;margin:0 auto;}
.stepper button{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;background:transparent;
  color:#88b6a2;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;transition:all .14s;}
.stepper button .num{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;
  background:rgba(255,255,255,.08);color:#9ff0c8;}
.stepper button.on{background:rgba(34,171,118,.16);color:#eafff4;border-color:rgba(34,171,118,.4);}
.stepper button.on .num{background:var(--primary);color:#fff;}
.stepper .arrow{color:#3c5f4f;font-size:13px;}
.demo-actions{display:flex;align-items:center;gap:10px;}
.demo-actions .toggle{display:inline-flex;align-items:center;gap:8px;border:1px solid #2a5443;background:rgba(255,255,255,.04);
  color:#cdeeda;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:999px;}
.demo-actions .toggle.on{background:var(--primary);border-color:var(--primary-600);color:#fff;}
.demo-actions .toggle .sw{width:30px;height:16px;border-radius:999px;background:#28473a;position:relative;transition:background .15s;}
.demo-actions .toggle.on .sw{background:#0c3b27;}
.demo-actions .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;
  background:#9bbcae;transition:all .16s;}
.demo-actions .toggle.on .sw::after{left:16px;background:#fff;}
.demo-actions .ghost{border:1px solid #2a5443;background:transparent;color:#a9d2c0;font-size:12.5px;font-weight:600;
  padding:7px 13px;border-radius:999px;}
.demo-actions .ghost:hover{background:rgba(255,255,255,.05);color:#fff;}

/* ---------- shared product bits ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;border-radius:100px;
  font-size:11.5px;font-weight:500;line-height:1;white-space:nowrap;}
.tag{display:inline-flex;align-items:center;gap:5px;height:21px;padding:0 9px;border-radius:999px;
  font-size:11px;font-weight:500;line-height:1;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);}

/* topnav */
.ua-topnav{position:relative;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);}
.ua-topnav .inner{width:fit-content;max-width:calc(100% - 48px);margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:22px;min-height:64px;}
.brandmark{display:flex;align-items:center;gap:11px;cursor:pointer;}
.brandmark .glyph{width:42px;height:42px;border-radius:12px;flex:none;
  background:linear-gradient(155deg,var(--primary) 0%,var(--primary-700) 100%);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px -3px var(--primary);}
.brandmark .glyph svg{display:block;}
.brandmark .txt{display:flex;flex-direction:column;justify-content:center;}
.brandmark .t1{font-weight:900;font-size:18px;color:var(--ink-900);line-height:1.1;}
.brandmark .t2{font-size:10.5px;color:var(--ink-500);font-weight:600;line-height:1.25;margin-top:1px;}
.ua-topnav nav{display:flex;align-items:center;gap:8px;}
.ua-topnav nav button{border:none;background:transparent;color:var(--ink-600);font-weight:500;font-size:14px;
  padding:7px 14px;border-radius:999px;white-space:nowrap;}
.ua-topnav nav button.on{background:var(--primary-soft);color:var(--primary-ink);font-weight:600;}
.userblock{margin-left:auto;display:flex;align-items:center;gap:12px;}
.userblock .nm{font-size:13px;font-weight:700;color:var(--ink-900);text-align:right;line-height:1.2;}
.userblock .em{font-size:11px;color:var(--ink-500);text-align:right;}
.role-pill{display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 11px;border-radius:999px;
  background:var(--primary-soft);color:var(--primary-ink);font-size:12px;font-weight:600;}
.btn-primary{display:inline-flex;align-items:center;gap:7px;border:none;background:var(--primary);color:#fff;
  padding:9px 18px;border-radius:999px;font-weight:600;font-size:14px;white-space:nowrap;box-shadow:0 2px 8px -3px var(--primary);}
.btn-ghost{border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-700);
  padding:9px 18px;border-radius:999px;font-weight:600;font-size:14px;}

/* ---------- search home ---------- */
.ua-home{min-height:calc(100vh - 49px);display:flex;flex-direction:column;
  background:radial-gradient(circle at 10% 18%,rgba(34,163,113,.14),transparent 26%),
    radial-gradient(circle at 79% 30%,rgba(74,144,217,.10),transparent 22%),
    linear-gradient(180deg,#F8FBF7 0%,#F0F6F1 100%);}
.ua-home-main{width:100%;max-width:1120px;margin:0 auto;display:grid;
  grid-template-columns:minmax(0,520px) minmax(330px,430px);align-items:start;align-content:center;
  justify-content:space-between;gap:clamp(24px,4vw,52px);padding:34px 42px 90px;flex:1;}
.ua-home-copy{max-width:520px;}
.ua-home-kicker{display:inline-flex;align-items:center;height:26px;padding:0 12px;margin-bottom:14px;
  border-radius:999px;background:rgba(17,122,86,.08);color:#087353;font-size:11px;font-weight:800;}
.ua-home-copy h1{margin:0 0 14px;color:#10241b;font-size:clamp(34px,3.6vw,46px);line-height:1.02;font-weight:900;text-align:left;}
.ua-home-copy h1 .first{color:var(--primary);}
.ua-home-copy p.lede{max-width:500px;margin:0 0 22px;color:#58665f;font-size:14.5px;font-weight:500;line-height:1.7;}
.ua-home-searchbox{max-width:520px;display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1.5px solid var(--border-strong);border-radius:14px;padding:6px 6px 6px 16px;box-shadow:var(--shadow-sm);
  transition:box-shadow .15s,border-color .15s;}
.ua-home-searchbox.focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft),var(--shadow-md);}
.ua-home-searchbox input{flex:1;border:none;outline:none;font-size:15.5px;color:var(--ink-900);background:transparent;padding:8px 0;}
.ua-home-searchbox button{display:inline-flex;align-items:center;gap:7px;border:none;background:var(--primary);color:#fff;
  padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;box-shadow:0 2px 8px -2px var(--primary);}
.ua-home-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;}
.ua-home-tags span{font-size:12px;color:var(--ink-500);background:var(--surface);border:1px solid var(--border);
  padding:4px 10px;border-radius:100px;}
.ua-home-controls{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;}
.fieldlabel{display:block;font-size:12px;font-weight:600;color:var(--ink-600);margin-bottom:7px;}
.rangeseg{display:flex;gap:6px;background:var(--surface-sunken);padding:4px;border-radius:10px;}
.rangeseg button{flex:1;border:none;border-radius:7px;padding:8px 4px;font-size:12.5px;font-weight:600;
  background:transparent;color:var(--ink-500);white-space:nowrap;}
.rangeseg button.on{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-xs);}
.reason-input{width:100%;border:1px solid var(--border-strong);border-radius:10px;padding:10px 12px;font-size:13.5px;
  color:var(--ink-900);background:var(--surface);}
/* evidence tiers */
.ua-evidence-card{width:100%;max-width:430px;margin-top:54px;padding:22px;border:1px solid rgba(17,122,86,.10);
  border-radius:var(--r-xl);background:rgba(255,255,255,.92);box-shadow:0 28px 58px -34px rgba(16,35,27,.52);}
.ua-evidence-head{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:14px;}
.ua-evidence-head span{color:#172820;font-weight:900;font-size:14px;}
.ua-evidence-head b{color:#8b948f;font-size:10px;letter-spacing:.08em;}
.ua-evidence-list{display:grid;gap:9px;}
.ua-evidence-tier{min-height:62px;display:grid;grid-template-columns:minmax(0,1fr) 38px;align-items:center;gap:8px;
  padding:11px 0 11px 14px;border-radius:var(--r-lg);border-left:5px solid var(--primary);}
.ua-evidence-tier strong{display:block;color:#0b6a4c;font-size:14px;line-height:1.2;margin-bottom:3px;}
.ua-evidence-tier p{margin:0;color:#69736e;font-size:11.5px;line-height:1.4;}
.ua-evidence-tier .no{color:rgba(34,39,36,.25);font-size:18px;font-weight:900;text-align:center;}
.ua-evidence-tier.profile{background:#E4F2EA;border-left-color:#22AB76;}
.ua-evidence-tier.signin{background:#FBF0CC;border-left-color:#DFA313;}
.ua-evidence-tier.signin strong{color:#A46C00;}
.ua-evidence-tier.audit{background:#F7E4D8;border-left-color:#DD6D30;}
.ua-evidence-tier.audit strong{color:#C84F22;}
.ua-evidence-tier.geo{background:#F3DAD7;border-left-color:#D64A3C;}
.ua-evidence-tier.geo strong{color:#B9342C;}
.home-foot{padding:16px 28px;text-align:center;color:var(--ink-400);font-size:12px;}

/* ---------- candidates ---------- */
.cand-wrap{max-width:760px;margin:0 auto;padding:44px 24px;}
.cand-card{display:flex;align-items:center;gap:16px;text-align:left;width:100%;background:var(--surface);padding:16px;
  border:1.5px solid var(--border);border-radius:var(--r-lg);transition:all .14s;box-shadow:var(--shadow-xs);}
.cand-card:hover{border-color:var(--border-strong);}
.cand-card.sel{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft),var(--shadow-sm);}
.avatar{border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-weight:600;box-shadow:var(--shadow-xs);}
.matchtag{font-size:10.5px;font-weight:600;color:var(--primary);background:var(--primary-soft);padding:2px 7px;border-radius:5px;}
.tenant-chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:1px 8px;border-radius:5px;
  background:var(--primary-soft);color:var(--primary-ink);}
.statuspill{font-size:11.5px;font-weight:600;padding:1px 7px;border-radius:5px;}
.radio{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--border-strong);}
.radio.on{border-color:var(--primary);background:var(--primary);}

/* ---------- results ---------- */
.appbar{position:sticky;top:49px;z-index:30;}
.targetbar{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-xs);}
.targetbar .inner{max-width:var(--maxw);margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:14px;}
.target-btn{display:flex;align-items:center;gap:9px;background:var(--surface-sunken);border:1px solid var(--border);
  border-radius:999px;padding:6px 6px 6px 14px;color:var(--ink-600);}
.progress{max-width:var(--maxw);margin:0 auto;padding:14px 24px 0;}
.progress .box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px;
  display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-xs);flex-wrap:wrap;}
.statusdot{width:8px;height:8px;border-radius:50%;flex:none;}
.results-body{max-width:var(--maxw);margin:0 auto;padding:20px 24px 60px;display:flex;flex-direction:column;gap:22px;}
.overview{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
.ovtile{text-align:left;border:1px solid var(--border);border-radius:var(--r-md);padding:14px;background:var(--surface);
  box-shadow:var(--shadow-xs);transition:all .12s;}
.ovtile:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.ovtile .ico{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;background:var(--surface-sunken);}
.ovtile .v{font-size:23px;font-weight:600;color:var(--ink-900);line-height:1;letter-spacing:-.02em;}
.ovtile .k{font-size:11.5px;color:var(--ink-500);margin-top:5px;}
.results-grid{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
.rail{display:flex;flex-direction:column;gap:14px;position:sticky;top:108px;max-height:calc(100vh - 120px);overflow-y:auto;}
.railLabel{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-500);
  text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
.tinytag{font-size:11px;color:var(--ink-500);background:var(--surface-sunken);padding:2px 7px;border-radius:5px;}
.maincol{display:flex;flex-direction:column;gap:22px;min-width:0;}
.sectitle{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sectitle .ico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:none;
  background:var(--surface-sunken);color:var(--ink-600);}
.sectitle .t{font-size:15px;font-weight:600;color:var(--ink-900);}
.sectitle .s{font-size:12px;color:var(--ink-500);margin-top:1px;}

/* AI story */
.aistory{border:1px solid var(--ai-soft);border-radius:var(--r-xl);overflow:hidden;background:var(--surface);
  box-shadow:0 1px 3px rgba(60,75,95,.08),0 8px 28px -16px rgba(60,75,95,.30);}
.aistory .head{background:linear-gradient(120deg,var(--ai-soft-2),var(--ai-soft));padding:16px 22px;
  display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--ai-soft);}
.aistory .head .glyph{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--ai),var(--ai-700));color:#fff;flex:none;box-shadow:0 3px 8px -2px var(--ai);}
.modeseg{display:flex;gap:4px;background:#ffffffaa;border-radius:9px;padding:3px;border:1px solid var(--ai-soft);}
.modeseg button{border:none;border-radius:6px;padding:6px 12px;font-size:12.5px;font-weight:600;background:transparent;color:var(--ai);}
.modeseg button.on{background:var(--ai);color:#fff;}
.cite{font-size:10px;font-weight:600;color:var(--ink-400);background:transparent;border:1px solid var(--border);
  border-radius:5px;padding:0 4px;margin-left:4px;font-family:var(--font-mono);vertical-align:.06em;}
.cite:hover{color:var(--primary);border-color:var(--primary);background:var(--primary-soft);}
.story-callout{display:flex;gap:9px;align-items:flex-start;margin-top:6px;padding:12px 14px;background:var(--warn-soft);
  border-radius:10px;border-left:3px solid var(--warn);color:var(--risk-med-ink);font-size:13.5px;line-height:1.6;}
.datechip{font-size:11.5px;font-weight:600;color:var(--ai);background:var(--ai-soft);border-radius:6px;padding:2px 9px;
  white-space:nowrap;font-family:var(--font-mono);}

/* risks */
.risk-item{border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);overflow:hidden;box-shadow:var(--shadow-xs);}
.risk-item.open{box-shadow:var(--shadow-sm);}
.risk-head{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:none;padding:13px 15px;}
.risk-head .ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;}
.sevtag{display:inline-flex;align-items:center;gap:5px;height:20px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:700;}
.evbadge{display:inline-flex;align-items:center;gap:5px;height:21px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:600;}
.evbadge .gem{width:6px;height:6px;border-radius:2px;}

/* timeline */
.tl-toolbar{position:sticky;top:104px;z-index:12;margin-bottom:14px;padding:10px 0;border-bottom:1px solid var(--hairline);
  background:rgba(247,250,246,.94);backdrop-filter:blur(8px);}
#sec-risk,#sec-timeline{scroll-margin-top:120px;}
.pillbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);
  color:var(--ink-600);padding:5px 12px;border-radius:999px;font-size:12.5px;font-weight:600;}
.pillbtn.on{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-ink);}
.tl-node{display:flex;gap:14px;position:relative;}
.tl-spine{display:flex;flex-direction:column;align-items:center;flex:none;width:30px;}
.tl-dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;z-index:1;border:2px solid var(--surface);box-shadow:var(--shadow-xs);}
.tl-line{flex:1;width:2px;background:var(--hairline);margin-top:2px;}
.tl-row{flex:1;min-width:0;display:flex;gap:12px;align-items:stretch;margin-bottom:12px;}
.tl-card{flex:1;min-width:0;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:12px 14px;transition:all .14s;box-shadow:var(--shadow-xs);}
.tl-card:hover{border-color:var(--border-strong);}
.tl-card.risk{border-color:var(--risk-high-soft);}
.tl-ipcard{width:236px;flex:none;text-align:left;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-md);padding:11px 13px;box-shadow:var(--shadow-xs);display:flex;flex-direction:column;gap:7px;}
.tl-ipcard.flag{border-color:var(--risk-high-soft);}
.srcchip{display:inline-flex;align-items:center;gap:5px;height:20px;padding:0 8px;border-radius:100px;font-size:11px;font-weight:600;}

/* drawers */
.scrim{position:fixed;inset:0;background:rgba(20,28,24,.32);z-index:90;animation:ua-fade .15s ease;}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(540px,94vw);background:var(--surface);z-index:91;
  box-shadow:-12px 0 40px -12px rgba(0,0,0,.3);display:flex;flex-direction:column;animation:drawer-in .22s ease;}
@keyframes drawer-in{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.drawer .dhead{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.drawer .dbody{padding:18px 22px;overflow-y:auto;flex:1;}
.kv{display:grid;grid-template-columns:118px 1fr;gap:6px 12px;font-size:12.5px;}
.kv .k{color:var(--ink-400);}
.kv .v{color:var(--ink-800);font-weight:500;}
.rawbox{margin-top:14px;background:#0e1c16;color:#cfe9dd;border-radius:8px;padding:13px 14px;font-family:var(--font-mono);
  font-size:11.5px;line-height:1.65;white-space:pre-wrap;word-break:break-all;}
.iconbtn{display:grid;place-items:center;width:34px;height:34px;border-radius:999px;border:1px solid var(--border);
  background:var(--surface);color:var(--ink-600);}

/* ---------- secondary pages (history / audit / sources) ---------- */
.ua-page{max-width:var(--maxw);margin:0 auto;padding:32px 24px;}
.ua-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);overflow:hidden;}
.ua-table th{background:var(--surface-sunken);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;
  letter-spacing:.05em;color:var(--ink-500);text-align:left;padding:10px 14px;}
.ua-table td{border-bottom:1px solid var(--hairline);padding:10px 14px;font-size:12.5px;color:var(--ink-700);}
.ua-table tr:hover td{background:var(--surface-sunken);}
.src-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);padding:16px;}

/* ---------- annotation layer ---------- */
.anno-pin{display:none;}
body.anno-on .anno-pin{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
  background:var(--primary);color:#fff;font-size:11px;font-weight:800;vertical-align:middle;margin:0 2px;flex:none;
  box-shadow:0 2px 6px -1px rgba(17,122,86,.6);animation:anno-ping 2.4s infinite;cursor:pointer;position:relative;z-index:5;}
body.anno-on .anno-pin:hover{transform:scale(1.12);}
/* floating-style pins anchored to a corner of a block */
.anno-anchor{position:relative;}
body.anno-on .anno-pin.corner{position:absolute;top:-9px;left:-9px;animation:anno-ping 2.4s infinite;}
.anno-pop{position:fixed;z-index:95;width:330px;max-width:92vw;background:#0c1f18;color:#e7f6ee;border-radius:12px;
  box-shadow:0 18px 50px -10px rgba(0,0,0,.5);padding:0;animation:ua-fade-up .18s ease;border:1px solid #1d4634;}
.anno-pop .ah{display:flex;align-items:center;gap:9px;padding:13px 15px 9px;border-bottom:1px solid #163b2c;}
.anno-pop .ah .n{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;font-weight:800;font-size:12px;
  display:grid;place-items:center;flex:none;}
.anno-pop .ah .ti{font-weight:800;font-size:14px;color:#fff;}
.anno-pop .ab{padding:11px 15px 14px;font-size:12.8px;line-height:1.62;color:#c8e3d6;}
.anno-pop .ab b{color:#9ff0c8;font-weight:700;}
.anno-pop .src{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;font-weight:600;color:#7fbfa3;
  background:rgba(34,171,118,.12);padding:4px 9px;border-radius:6px;}
.anno-pop .closep{margin-left:auto;border:none;background:transparent;color:#6f9685;}
.anno-hint{display:none;}
body.anno-on .anno-hint{display:flex;align-items:center;gap:8px;justify-content:center;padding:9px 16px;
  background:var(--primary-soft);color:var(--primary-ink);font-size:12.5px;font-weight:600;border-bottom:1px solid rgba(17,122,86,.18);}

/* intro modal */
.intro-scrim{position:fixed;inset:0;background:rgba(12,31,24,.55);z-index:100;display:grid;place-items:center;padding:24px;animation:ua-fade .2s ease;}
.intro{width:100%;max-width:560px;background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden;}
.intro .ih{padding:26px 28px 18px;background:linear-gradient(135deg,#0e6346,#117A56);color:#fff;}
.intro .ih h2{margin:0 0 6px;font-size:21px;font-weight:900;}
.intro .ih p{margin:0;font-size:13px;color:#cdeede;line-height:1.6;}
.intro .ib{padding:22px 28px;}

.intro .step:last-child{border-bottom:none;}
.intro .step .n{width:26px;height:26px;border-radius:50%;background:var(--primary-soft);color:var(--primary-ink);

.intro .if{padding:0 28px 26px;display:flex;gap:10px;justify-content:flex-end;}

function pin(key,corner){return `<span class="anno-pin${corner?' corner':''}" data-anno="${key}">${ANNOS[key].n}</span>`;}
function avatar(name,hue,size){const i=(name||'?').trim().charAt(0);
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size*0.42}px;
    background:linear-gradient(150deg,hsl(${hue} 62% 56%),hsl(${hue+24} 58% 46%))">${i}</div>`;}
function srcchip(id){const m=SRC_META[id]||{label:id,icon:"dot",hue:"profile"};
  return `<span class="srcchip" style="background:var(--src-${m.hue}-soft);color:var(--src-${m.hue})">${icon(m.icon,12,2)}${m.label}</span>`;}
function evbadge(level){const m=EV_META[level]||EV_META.weak;
  return `<span class="evbadge" style="background:${m.soft};color:${m.color};border:${m.dash?'1px dashed '+m.color:'1px solid transparent'}">
    <span class="gem" style="background:${m.color};transform:${m.dash?'none':'rotate(45deg)'}"></span></span>`;}
function statusdot(status,pulse){const m=STATUS_META[status]||STATUS_META.no_data;
  return `<span class="statusdot" style="background:${m.color};box-shadow:0 0 0 3px ${m.color}22;${pulse?'animation:ua-pulse 1.1s ease-in-out infinite':''}"></span>`;}

function timelineToolbar(){
  const laneTabs=[["all","全部车道","layers"],["user_action","用户操作","user"],["account_admin","账号管理","key"],["non_interactive","非交互","refresh"]];
  const filters=[["all","全部"],["risk","仅风险"],["entra_signin","登录"],["entra_audit","审计"],["prod_es","Ucenter"],["pdcvlog","LogInsight"]];
  const laneCount=id=>id==="all"?EVENTS.length:EVENTS.filter(e=>e.lane===id).length;
  return `<div class="tl-toolbar">
    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      ${laneTabs.map(([id,l,ic])=>{const on=STATE.lane===id;const m=LANE_META[id];const tint=m?m.color:'var(--primary)';const soft=m?m.soft:'var(--primary-soft)';
        return `<button class="pillbtn" data-lane="${id}" style="${on?`border-color:${tint};background:${soft};color:${tint}`:''}">${icon(ic,13,2)}${l}<span class="mono" style="font-size:11px;font-weight:700;opacity:${on?1:.6}">${laneCount(id)}</span></button>`;}).join("")}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${filters.map(([id,l])=>`<button class="pillbtn${STATE.filter===id?' on':''}" data-filter="${id}">${l}</button>`).join("")}

  </div>`;
}
function passFilter(e){
  if(STATE.lane!=="all"&&e.lane!==STATE.lane) return false;
  if(STATE.filter==="risk") return !!e.risk;
  if(STATE.filter!=="all"&&STATE.filter!=="risk") return e.source===STATE.filter;
  return true;
}
function ipCard(rawIp){

  const ip=IPS[rawIp];const enriched=!!ip;const flagged=enriched&&ip.flag;const internal=enriched&&ip.is_internal;
  const loc=!enriched?"未富化":(ip.site||[ip.country,ip.city].filter(Boolean).join(" · ")||"—");
  const owner=enriched?ip.owner:"";

    <div class="tl-spine"><span class="tl-dot" style="background:${dotBg};color:${dotCol};border-color:${isRisk?'var(--risk-high)':'var(--surface)'}">${icon(cat,15,2)}</span>${last?'':'<span class="tl-line"></span>'}</div>

function timelineList(){
  const items=EVENTS.filter(passFilter);
  if(!items.length) return `<div style="font-size:13px;color:var(--ink-500);padding:12px 0">该筛选条件下无事件。</div>`;
  const groups=[];
  items.forEach(e=>{const d=e.time.slice(0,10);let g=groups.find(x=>x.date===d);if(!g){g={date:d,items:[]};groups.push(g);}g.items.push(e);});
  return groups.map(g=>`<div style="margin-bottom:6px">
    <div style="display:flex;align-items:center;gap:10px;margin:4px 0 10px">
      <span class="mono" style="font-size:12px;font-weight:600;color:var(--ink-600);background:var(--surface-sunken);padding:3px 10px;border-radius:6px">${g.date}</span>
      <span style="flex:1;height:1px;background:var(--hairline)"></span>
      <span style="font-size:11.5px;color:var(--ink-400)">${g.items.length} 条事件</span>
    </div>
    <div style="position:relative;padding-left:4px">
      ${g.items.map((e,i)=>eventNode(e,i===g.items.length-1)).join("")}
    </div>
  </div>`).join("");
}

      <div class="kv">${rows.map(([k,v])=>`<div class="k">${k}</div><div class="v ${/^(事件 ID|时间|来源 IP|会话)/.test(k)?'mono':''}">${v}</div>`).join("")}</div>
      <div style="margin-top:18px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:11px;font-weight:600;color:var(--ink-500);text-transform:uppercase;letter-spacing:.03em">脱敏原始日志</div>
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-500);background:var(--surface-sunken);padding:3px 9px;border-radius:5px">${icon("lock",11)}敏感字段已脱敏</span>
      </div>
      <div class="rawbox">${rawLogFor(e)}</div>
      <button style="margin-top:12px;width:100%;border:1px dashed var(--border-strong);background:var(--surface);color:var(--ink-600);padding:10px;border-radius:8px;font-size:12.5px;font-weight:600" id="revealBtn">${icon("eye",14)} 申请查看完整原始日志（需权限 · 写入审计）</button>
    </div>`);
  $("#revealBtn").addEventListener("click",()=>toast("演示模式：完整原始日志的查看申请已记入审计追踪。"));
}
function openIPDrawer(rawIp){
  const ip=IPS[rawIp];if(!ip)return;
  const rows=[["IP 地址",ip.ip],["类型",ip.type],["内网",ip.is_internal?"是":"否"],["国家 / 地区",ip.country||"—"],
    ["城市",ip.city||"—"],["企业站点",ip.site||"—"],["ASN",ip.asn||"—"],["ISP / 运营商",ip.isp||"—"],
    ["网络所有者",ip.owner||"—"],["富化来源",ip.geo_source],["置信度",Math.round(ip.confidence*100)+"%"],["解析时间",ip.last_resolved_at]];
  openDrawer(`
    <div class="dhead">
      <span style="width:36px;height:36px;border-radius:9px;display:grid;place-items:center;flex:none;background:${ip.is_internal?'var(--surface-sunken)':'var(--src-entra-soft)'};color:${ip.is_internal?'var(--ink-500)':'var(--src-entra)'}">${icon(ip.is_internal?"building":"globe",18)}</span>
      <div style="flex:1"><div class="mono" style="font-weight:700;font-size:16px;color:var(--ink-900)">${ip.ip}</div>
        <div style="font-size:12px;color:var(--ink-500);margin-top:3px">${ip.site||[ip.country,ip.city].filter(Boolean).join(" · ")}</div></div>
      <button class="iconbtn" id="drawerClose">${icon("x",18)}</button>
    </div>
    <div class="dbody">
      ${ip.flag?`<div style="display:flex;gap:9px;align-items:flex-start;padding:12px 14px;background:var(--risk-high-soft);border-radius:10px;border-left:3px solid var(--risk-high);color:var(--risk-high-ink);font-size:13px;line-height:1.6;margin-bottom:16px">
        ${icon("alert",15,2,"var(--risk-high)")}<span><strong>异常地点 — </strong>${ip.note}</span></div>`:''}
      <div style="font-size:11px;font-weight:600;color:var(--ink-500);text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px">IP 画像与地理富化</div>
      <div class="kv">${rows.map(([k,v])=>`<div class="k">${k}</div><div class="v ${/^(IP|ASN)/.test(k)?'mono':''}">${v}</div>`).join("")}</div>
      <div style="margin-top:16px;font-size:12px;color:var(--ink-500);line-height:1.6;background:var(--surface-sunken);padding:11px 13px;border-radius:8px">
        ${icon("shield",13)} 内网 IP 通过企业子网表解析为办公室 / 数据中心 / ZPA 出口；公网 IP 经 GeoIP 富化并标注置信度。位置来源冲突时显示来源与置信度，不隐藏分歧。</div>
    </div>`);
}
function openDrawer(html){
  $("#overlay").innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer">${html}</div>`;
  $("#scrim").addEventListener("click",closeDrawer);
  const c=$("#drawerClose");if(c)c.addEventListener("click",closeDrawer);
}
function closeDrawer(){$("#overlay").innerHTML="";}

/* ============================================================
   注释系统
   ============================================================ */
let curAnno=null;
function bindAnno(){
  document.body.addEventListener("click",e=>{
    const p=e.target.closest(".anno-pin");
    if(p){e.stopPropagation();showAnno(p.dataset.anno,p);return;}
    if(!e.target.closest(".anno-pop")) hideAnno();
  });
  window.addEventListener("scroll",hideAnno,true);
}
function showAnno(key,pinEl){
  const a=ANNOS[key];if(!a)return;
  hideAnno();
  const pop=document.createElement("div");pop.className="anno-pop";
  pop.innerHTML=`<div class="ah"><span class="n">${a.n}</span><span class="ti">${a.title}</span><button class="closep">${icon("x",16)}</button></div>
    <div class="ab">${a.body}<div class="src">${icon("layers",12)}${a.src}</div></div>`;
  document.body.appendChild(pop);
  const r=pinEl.getBoundingClientRect();const pw=pop.offsetWidth,ph=pop.offsetHeight;
  let left=r.left+r.width/2-pw/2;let top=r.bottom+10;
  if(left<8)left=8;if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(top+ph>window.innerHeight-8)top=r.top-ph-10;
  if(top<8)top=8;
  pop.style.left=left+"px";pop.style.top=top+"px";
  pop.querySelector(".closep").addEventListener("click",hideAnno);
  curAnno=pop;
}
function hideAnno(){if(curAnno){curAnno.remove();curAnno=null;}}

/* ============================================================
   toast
   ============================================================ */
let toastT=null;
function toast(msg){
  let t=$("#toast");if(!t){t=document.createElement("div");t.id="toast";
    t.style.cssText="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:99;background:#0c1f18;color:#e7f6ee;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);max-width:90vw;text-align:center;display:flex;align-items:center;gap:9px";
    document.body.appendChild(t);}
  t.innerHTML=icon("check",16,2.4,"#9ff0c8")+msg;t.style.opacity="1";
  clearTimeout(toastT);toastT=setTimeout(()=>{t.style.transition="opacity .4s";t.style.opacity="0";},2600);
}

/* ============================================================
   导航 / 路由
   ============================================================ */
function go(screen){STATE.page="investigate";STATE.screen=screen;render();window.scrollTo(0,0);}
function goNav(id){STATE.page=id;render();window.scrollTo(0,0);}
function render(){
  hideAnno();closeDrawer();
  if(STATE.page==="history")renderHistory();
  else if(STATE.page==="audit")renderAudit();
  else if(STATE.page==="sources")renderSources();
  else if(STATE.screen==="search")renderSearch();
  else if(STATE.screen==="candidates"){if(!STATE.selCand)STATE.selCand="k-simon";renderCandidates();}
  else renderResults();
  syncStepper();
}
function bindNav(){
  $$("[data-go]").forEach(b=>b.addEventListener("click",()=>go(b.dataset.go)));
  $$("[data-nav]").forEach(b=>b.addEventListener("click",()=>goNav(b.dataset.nav)));
}
function syncStepper(){
  $$("#stepper button").forEach(b=>b.classList.toggle("on",STATE.page==="investigate"&&b.dataset.step===STATE.screen));
}

/* ============================================================
   demo chrome 绑定
   ============================================================ */
$("#stepper").addEventListener("click",e=>{const b=e.target.closest("[data-step]");if(b){
  if(b.dataset.step==="results"&&!STATE.selCand)STATE.selCand="k-simon";go(b.dataset.step);}});
$("#annoToggle").addEventListener("click",()=>{
  const on=document.body.classList.toggle("anno-on");
  $("#annoToggle").classList.toggle("on",on);
  if(!on)hideAnno();
});
$("#restartBtn").addEventListener("click",()=>{STATE={page:"investigate",screen:"search",range:"7d",aiMode:"free",filter:"all",lane:"user_action",openRisk:"r1",selCand:null,auditTab:"queries"};go("search");});
$("#introBtn").addEventListener("click",showIntro);

  $("#overlay").innerHTML=`<div class="intro-scrim" id="introScrim"><div class="intro">
    <div class="ih"><h2>UserAct 交互式演示</h2><p>企业用户账号活动搜寻台 — 把分散在 Entra ID、Ucenter、LogInsight 的日志，聚合成一条带证据的账号活动故事线。</p></div>
    <div class="ib">
      <div class="step"><span class="n">1</span><div><div class="tt">账号搜索</div><div class="dd">用 UPN / 邮箱 / 工号 / 显示名搜索，设置时间范围与查询原因。点搜索按钮进入下一步。</div></div></div>
      <div class="step"><span class="n">2</span><div><div class="tt">候选消歧</div><div class="dd">输入有歧义时选择唯一目标账号（注意多租户 🏢 标签），再开始活动查询。</div></div></div>
      <div class="step"><span class="n">3</span><div><div class="tt">活动故事线</div><div class="dd">查看概览、账号画像、AI 故事线、风险提示与详细时间线；可切换 AI 模式、筛选时间线、点开事件 / IP 证据抽屉。</div></div></div>
      <div class="step"><span class="n">▦</span><div><div class="tt">顶部四个板块</div><div class="dd">顶栏导航可切换 <b>搜寻台 / 查询历史 / 审计追踪 / 数据源</b>——后三者是历史快照、合规留痕与数据源探测状态，均可点击查看。</div></div></div>
      <div class="step"><span class="n">★</span><div><div class="tt">注释模式</div><div class="dd">界面上闪烁的绿色数字 ❶❷❸ 可点击，查看每个区域的功能说明与对应数据源。随时可在右上角开关。</div></div></div>
    </div>
    <div class="if"><button class="btn-primary" id="introStart">开始体验 ${icon("arrowR",16,2,"#fff")}</button></div>
  </div></div>`;
  $("#introScrim").addEventListener("click",e=>{if(e.target.id==="introScrim")$("#overlay").innerHTML="";});
  $("#introStart").addEventListener("click",()=>$("#overlay").innerHTML="");
}

/* ============================================================
   启动
   ============================================================ */
bindAnno();
render();
showIntro();
</script>
