<!DOCTYPE html>
<!--
  ============================================================================
  MultiAgent Cowork · SOC AI Platform —— 产品 UI 可交互演示（带讲解注释）
  ----------------------------------------------------------------------------
  本页以【真实产品界面】的视角呈现功能：复刻了 SOC Hub 的侧边栏 / 顶栏 /
  工单列表 / 事件详情（三栏：资产档案+情报矩阵 / 研判流水线时间线 / 处置面板）
  / Agent 配置中心。所有术语、配色(hex)、布局、字段都对齐真实前端与后端代码
  （Primitives.jsx / AlertList.jsx / AlertDetail.jsx / AgentConfig.jsx 及
   agents/intel|tier1|hunter.py、main.py）。

  自包含单文件，不联网、不依赖后端，双击即可打开。数据为贴近真实的演示数据。
  右上「讲解模式」可显示功能注释（①②③ 蓝点，悬停查看）。
  ============================================================================
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOC Hub · MultiAgent Cowork · 产品演示</title>
<style>
  /* ---- 调色板：取自前端 index.css / Primitives.jsx 真实 hex ---- */
  :root{
    --bg:#0A0E14; --card:#0B1018; --card-2:#0F141B; --line:#1F2937; --line-soft:#161C26;
    --accent:#3B82F6; --accent-2:#1D4ED8; --text:#E5E7EB; --text-2:#CBD5E1; --muted:#64748B;
    --p1:#EF4444; --p2:#F59E0B; --p3:#EAB308; --p4:#10B981; --undef:#94A3B8;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13.5px;line-height:1.5;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  .mono{font-family:var(--mono)}
  .muted{color:var(--muted)} .dim{color:var(--text-2)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#1c2632;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ================= 应用骨架：侧边栏 + 主区 ================= */
  .app{display:flex;height:100vh;overflow:hidden}

  /* ---- 侧边栏（复刻 Primitives.jsx Sidebar） ---- */
  .sidebar{width:236px;flex:0 0 236px;background:#080B11;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 14px}
  .logoRow{display:flex;align-items:center;gap:11px;padding:4px 6px 16px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);box-shadow:0 0 12px rgba(59,130,246,.35);display:grid;place-items:center;color:#fff;font-size:17px}
  .logoRow .nm{font-size:14px;font-weight:700;letter-spacing:.2px}
  .logoRow .sb{font-size:9.5px;color:var(--muted);letter-spacing:1.6px;text-transform:uppercase}
  .navlabel{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#3b4656;margin:14px 8px 6px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;color:var(--text-2);cursor:pointer;font-size:13px;transition:.13s;margin-bottom:2px}
  .nav:hover{background:#10161f;color:var(--text)}
  .nav.active{background:rgba(59,130,246,.10);color:#cfe0ff;box-shadow:0 0 0 1px rgba(59,130,246,.22) inset}
  .nav.disabled{opacity:.4;cursor:not-allowed}
  .nav .ic{width:16px;text-align:center;opacity:.85}
  .nav .ct{margin-left:auto;font-size:11px;font-family:var(--mono);background:#131b25;border:1px solid var(--line);border-radius:999px;padding:0 7px;color:var(--muted)}
  .nav.active .ct{color:#9fc0ff;border-color:rgba(59,130,246,.4)}
  .sidefoot{margin-top:auto;padding:10px 8px 2px;border-top:1px solid var(--line-soft);font-size:10.5px;color:var(--muted)}

  /* ---- 主区 ---- */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:54px;flex:0 0 54px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;background:rgba(10,14,20,.7)}
  .crumb{font-size:12px;color:var(--muted)}
  .crumb b{color:var(--text-2);font-weight:600}
  .topbar .ttl{font-size:15px;font-weight:700}
  .topbar .spacer{flex:1}
  .sync{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-2)}
  .pulse{width:7px;height:7px;border-radius:50%;background:#10B981;box-shadow:0 0 8px #10B981;animation:bp 1.6s infinite}
  @keyframes bp{0%,100%{opacity:1}50%{opacity:.4}}
  .demoPill{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#7fd1e8;border:1px solid #1d3346;background:#0c1a24;border-radius:999px;padding:3px 9px}
  .btn{border:1px solid var(--line);background:var(--card-2);color:var(--text-2);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:.14s}
  .btn:hover{border-color:#2b3a50;color:var(--text)}
  .btn.primary{background:linear-gradient(135deg,#3B82F6,#1D4ED8);border-color:transparent;color:#fff;font-weight:600}
  .btn.sm{padding:4px 9px;font-size:11.5px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);cursor:pointer;user-select:none}
  .switch{width:36px;height:20px;border-radius:11px;background:#1b2330;border:1px solid var(--line);position:relative;transition:.2s}
  .switch::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#64748B;top:2px;left:2px;transition:.2s}
  .toggle.on .switch{background:rgba(59,130,246,.35);border-color:var(--accent)}
  .toggle.on .switch::after{left:18px;background:var(--accent)}
  select.speed{background:var(--card-2);color:var(--text-2);border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-size:11.5px;font-family:var(--mono)}

  .screen{flex:1;overflow:auto;padding:22px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:600}
  .ptitle{font-size:13px;font-weight:700;margin-top:2px}

  /* ================= SOC Hub 工单列表 ================= */
  /* 搜索 + 筛选条（对齐真实界面：搜索框 + 分段 P1-4 + 下拉 + SLA + 计数） */
  .searchbar{display:flex;align-items:center;gap:11px;margin-bottom:16px;flex-wrap:wrap}
  .searchbox{flex:1;min-width:240px;display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 13px}
  .searchbox .mg{color:var(--muted)}
  .searchbox input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:var(--sans);font-size:13px}
  .searchbox input::placeholder{color:#475569}
  .kbd{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-family:var(--mono)}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--text-2);padding:8px 15px;font-size:12.5px;cursor:pointer;font-family:var(--mono);transition:.12s}
  .seg button:hover{color:var(--text)}
  .seg button.on{background:rgba(59,130,246,.16);color:#cfe0ff;font-weight:600}
  .dd{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:.12s}
  .dd:hover{border-color:#2b3a50}
  .dd b{color:var(--text);font-weight:600}
  .dd .ar{color:var(--muted);font-size:9px}
  .sla{font-size:12px;color:var(--muted);font-family:var(--mono);padding-left:4px}
  .listcnt{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .listcnt b{color:var(--text-2)}

  /* 统计卡片：英文大写标题 + 大数字 + 中文副标 + sparkline 柱状图 */
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-bottom:18px}
  @media(max-width:1100px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:13px;cursor:pointer;transition:.14s;overflow:hidden;padding:0}
  .stat-card:hover{border-color:#2b3a50}
  .stat-card.active{border-color:var(--cat);box-shadow:0 0 0 1px var(--cat) inset}
  .sc-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 12px}
  .sc-en{font-size:11.5px;letter-spacing:1.6px;font-weight:700;color:var(--cat)}
  .sc-num{font-size:27px;font-weight:800;font-family:var(--mono);color:#F1F5F9;line-height:1}
  .sc-body{padding:0 16px 14px}
  .sc-cn{font-size:12px;color:var(--text-2)}
  .spark{display:flex;align-items:flex-end;gap:3px;height:42px;margin-top:11px}
  .spark i{flex:1;min-width:0;background:var(--cat);opacity:.3;border-radius:1.5px;transition:opacity .3s}
  .spark i.hot{opacity:.92}

  table.tickets{width:100%;border-collapse:collapse;font-size:12.5px}
  table.tickets th{text-align:left;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
  table.tickets td{padding:11px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  table.tickets tr.trow{cursor:pointer;transition:.12s}
  table.tickets tr.trow:hover{background:#0e141d}
  table.tickets td.selcol{width:30px}
  table.tickets input[type=checkbox]{accent-color:var(--accent);cursor:pointer}
  .mssrow{display:flex;align-items:center;gap:8px}
  .sdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .mss{font-family:var(--mono);color:#cfe0ff}
  .tstamp{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px;padding-left:16px}
  .alertcell{max-width:290px;line-height:1.45}
  .divbadge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;padding:1px 7px;border-radius:6px;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.32);color:#FCD34D;margin-top:7px;font-family:var(--mono)}
  .hostcell .h{font-family:var(--mono)} .hostcell .ip{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
  .critbadge{font-size:11px;padding:2px 9px;border-radius:6px;font-weight:600}
  .agcol{min-width:150px}
  .agcol .lbl{font-size:12.5px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
  .agcol .lbl .pct{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .agcol .done{color:#6EE7B7} .agcol .run{color:#9fc0ff} .agcol .warn{color:#FCD34D} .agcol .skipc{color:#94A3B8}
  .progress{height:6px;border-radius:4px;background:#16202e;overflow:hidden;margin-top:6px}
  .progress > i{display:block;height:100%;border-radius:4px;transition:width 1s}
  .arrowcell{color:var(--muted);text-align:right;font-size:16px}
  table.tickets tr.trow:hover .arrowcell{color:var(--accent)}
  .stat-pill{font-size:10.5px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);font-family:var(--mono)}
  .stat-pill.ok{color:#6EE7B7;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.08)}
  .stat-pill.run{color:#cfe0ff;border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.10)}
  .stat-pill.warn{color:#FCD34D;border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
  .stat-pill.skip{color:#94A3B8;border-color:var(--line)}

  .pbadge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:7px;font-weight:800;font-size:12.5px;font-family:var(--mono)}
  .dot{width:8px;height:8px;border-radius:50%}

  /* ================= 事件详情 ================= */
  .detail-grid{display:grid;grid-template-columns:300px minmax(0,1.7fr) 320px;gap:18px;align-items:start}
  @media(max-width:1180px){.detail-grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:16px}
  .card h3{margin:0 0 11px;font-size:11.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line-soft);font-size:12.5px}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted)} .kv .v{color:var(--text);text-align:right;font-family:var(--mono)}

  .srcrow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line-soft)}
  .srcrow:last-child{border-bottom:0}
  .srcrow .nm{font-size:12px}
  .srcrow .sc{font-family:var(--mono);font-weight:700}
  .scorebox{margin-top:10px;background:var(--card-2);border:1px solid var(--line-soft);border-radius:9px;padding:10px}
  .bar{height:7px;border-radius:4px;background:#16202e;overflow:hidden;margin-top:7px}
  .bar > i{display:block;height:100%;width:0;border-radius:4px;transition:width .9s cubic-bezier(.2,.7,.2,1)}

  /* 时间线 */
  .tl{position:relative}
  .node{position:relative;padding:0 0 16px 50px}
  .node:not(:last-child)::before{content:"";position:absolute;left:18px;top:36px;bottom:-2px;width:2px;background:linear-gradient(180deg,rgba(96,165,250,.30),rgba(96,165,250,.05))}
  .glyph{position:relative;left:0;top:0;width:38px;height:38px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:14px;color:var(--muted);position:absolute}
  .glyph::before{content:"";position:absolute;inset:0;background:var(--card-2);transition:.25s}
  .glyph.hex::before{clip-path:polygon(25% 6%,75% 6%,100% 50%,75% 94%,25% 94%,0 50%)}
  .glyph.tri::before{clip-path:polygon(50% 8%,93% 90%,7% 90%)}
  .glyph.dia::before{clip-path:polygon(50% 4%,96% 50%,50% 96%,4% 50%)}
  .glyph.sq::before{clip-path:inset(6% round 8px)}
  .glyph span{position:relative;z-index:1}
  .node.run .glyph::before{background:rgba(59,130,246,.18)}
  .node.run .glyph{color:#cfe0ff;animation:gp 1.1s infinite}
  .node.done .glyph::before{background:rgba(96,165,250,.14)}
  .node.done .glyph{color:#9fc0ff}
  .node.skip .glyph::before{background:#10141b}
  @keyframes gp{0%,100%{filter:drop-shadow(0 0 0 rgba(59,130,246,.5))}50%{filter:drop-shadow(0 0 6px rgba(59,130,246,.5))}}

  .acard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;opacity:.5;transition:.3s}
  .node.run .acard,.node.done .acard{opacity:1}
  .node.skip .acard{opacity:.72}
  .node.run .acard{border-color:rgba(59,130,246,.45)}
  .ahead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .code{font-family:var(--mono);font-weight:700;font-size:13px}
  .aname{color:var(--text-2);font-size:12.5px}
  .ahead .right{margin-left:auto;display:flex;align-items:center;gap:7px}
  .model-tag{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:5px;background:#10202e;border:1px solid #1d3346;color:#7fd1e8}
  .model-tag.esc{background:#241a2e;border-color:#3d2a4e;color:#d6a8ff}
  .ameta{font-size:10.5px;color:var(--muted);font-family:var(--mono);margin-top:4px}
  .abody{margin-top:10px;display:none}
  .node.done .abody,.node.skip .abody{display:block}
  .out-summary{font-size:12.5px;color:var(--text-2);background:var(--card-2);border:1px solid var(--line-soft);border-radius:9px;padding:9px 11px;margin-top:8px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}
  .field{background:var(--card-2);border:1px solid var(--line-soft);border-radius:9px;padding:7px 10px}
  .field.full{grid-column:1/-1}
  .field .lab{font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
  .field .val{font-size:12.5px;margin-top:2px;font-weight:600}
  .verdict{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11.5px;font-weight:700}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:6px;background:#1a1410;border:1px solid #3a2a1a;color:#f0b27a}
  .chain{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px;font-size:11.5px;color:var(--text-2)}
  .chain .arr{color:var(--muted)}
  .acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .act{font-size:10.5px;padding:2px 9px;border-radius:6px;background:#10202e;border:1px solid #1d3346;color:#9fd4e8}

  /* RAW 折叠块 */
  .raw{margin-top:9px;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .raw > summary{list-style:none;cursor:pointer;padding:7px 11px;font-size:11px;color:var(--muted);font-family:var(--mono);background:#0a0f16;display:flex;align-items:center;gap:7px}
  .raw > summary::-webkit-details-marker{display:none}
  .raw > summary::before{content:"▸";transition:.2s}
  .raw[open] > summary::before{transform:rotate(90deg)}
  .raw pre{margin:0;padding:11px;font-family:var(--mono);font-size:11px;line-height:1.6;color:#a9c2dd;background:#070A0F;overflow:auto;max-height:230px}
  .raw .ky{color:#7fd1e8} .raw .st{color:#9ae6b4} .raw .nu{color:#f0b27a}

  /* 处置面板 */
  .disp-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.35);border-radius:9px;padding:9px 11px;font-size:12px;color:#FCA5A5;margin-bottom:12px}
  .check{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text-2);padding:5px 0}
  .check input{margin-top:2px}
  textarea.basis{width:100%;background:var(--card-2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:12px;padding:8px 10px;resize:vertical;min-height:64px;margin-top:6px}
  .dispbtns{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .btn.full{width:100%;text-align:center}
  .btn.danger{border-color:rgba(239,68,68,.4);color:#FCA5A5}
  .btn.ghost{background:transparent}

  /* mini WS 事件流（详情底部） */
  .wsmini{margin-top:14px;font-family:var(--mono);font-size:10.5px;background:#070A0F;border:1px solid var(--line);border-radius:10px;padding:9px 11px;height:118px;overflow:auto}
  .wsline{padding:1px 0;color:var(--text-2);opacity:0;animation:fadein .25s forwards}
  @keyframes fadein{to{opacity:1}}
  .wsline .t{color:#3d5775}
  .wsline .ev{color:#7fd1e8} .wsline .ev.c{color:#6EE7B7} .wsline .ev.s{color:#9fb4cf}

  /* ================= Agent 配置中心 ================= */
  .online{font-size:10.5px;color:#6EE7B7;display:flex;align-items:center;gap:5px}

  /* 顶部 4 张 Agent 卡片（可点选切换） */
  .agrow{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:16px}
  @media(max-width:1200px){.agrow{grid-template-columns:repeat(2,1fr)}}
  .agc{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 15px;cursor:pointer;transition:.14s}
  .agc:hover{border-color:#2b3a50}
  .agc.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .agc.sel.human{border-color:#F59E0B;box-shadow:0 0 0 1px #F59E0B inset}
  .agc .top{display:flex;align-items:center;gap:11px}
  .agc .ico{width:34px;height:34px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;color:#fff;font-family:var(--mono);font-weight:700;font-size:15px}
  .agc .code{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.4px}
  .agc .cn{font-size:12px;color:var(--text-2);margin-top:1px}
  .agc .st{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:999px;display:flex;align-items:center;gap:5px}
  .agc .st.on{color:#6EE7B7;border:1px solid rgba(16,185,129,.3);background:rgba(16,185,129,.08)}

  if(t.status==='closed_false_positive') return `<div class="lbl"><span class="skipc">误报关闭</span><span class="pct">100%</span></div><div class="progress"><i style="width:100%;background:#3a4452"></i></div>`;
  return `<div class="lbl"><span class="done">完成</span><span class="pct">100%</span></div><div class="progress"><i style="width:100%;background:linear-gradient(90deg,#10B981,#34D399)"></i></div>`;
}

function passFilter(t){
  if(gradeFilter!=='全部' && t.grade!==gradeFilter) return false;
  if(scopeFilter==='pending' && !(t.status==='pending_approval'||t.status==='processing')) return false;
  if(scopeFilter==='resolved' && (t.status==='pending_approval'||t.status==='processing')) return false;
  if(FILT.status==='处理中' && t.status!=='processing') return false;
  if(FILT.status==='已完成' && !(t.status==='completed'||t.status==='closed_false_positive')) return false;
  if(FILT.crit!=='全部' && CRIT[t.crit].t!==FILT.crit) return false;
  if(SEARCH){ const q=SEARCH.toLowerCase(); if(!(t.id+' '+t.alert+' '+t.host+' '+t.ip).toLowerCase().includes(q)) return false; }
  return true;
}
function sparkBars(){return SPARKBASE.map((h,i)=>`<i class="${i>=SPARKBASE.length-4?'hot':''}" style="height:${h}%"></i>`).join('')}

}

function bodyHunter(t){

function bodyCmd(t){
  const d=t.cmd;

  if(d.autoclose) return {stat:'AUTO-CLOSE',statCls:'skip',meta:'AI 自动闭环 · 0 Token',
    html:`<div class="out-summary">两类自动关闭之一（校准FP / 规则误报快关）。CMDB 无映射的可疑工单不再直接归档，改由二线 HUNTER 研判；基础设施故障（超时/配额）不再伪造 P3，而是标 error 可重试。状态置为 <span class="mono">closed_false_positive</span>，人工不介入。</div>`};
  const txt = d.decision==='pending_approval'?'转人工审批 · 通知 '+d.notify : '自动完成（P3/P4 无需人工）';
  return {stat:d.decision==='pending_approval'?'待审批':'已决策',statCls:d.decision==='pending_approval'?'warn':'ok',meta:txt,
    html:`<div class="out-summary">${esc(d.label)} —— ${d.decision==='pending_approval'?'P1/P2 转人工审批并推送 '+esc(d.notify):'P3/P4 自动闭环为 completed'}。</div>`};
}

/* 生成「完整输出 · RAW」折叠块（伪 JSON，带语法着色） */
function rawBlock(agent,obj){
  const json = JSON.stringify(obj,null,2)
    .replace(/"([^"]+)":/g,'<span class="ky">"$1"</span>:')
    .replace(/: "([^"]*)"/g,': <span class="st">"$1"</span>')
    .replace(/: (\d+|true|false)/g,': <span class="nu">$1</span>');
  return `<details class="raw"><summary>完整输出 · RAW</summary><pre>${json}</pre></details>`;
}

/* 把节点画成终态（或处理中工单的当前阶段） */
function paintNode(key,t,forceState){
  const node=$('#nd-'+key); if(!node) return;
  const map={intel:bodyIntel,tier1:bodyTier1,hunter:bodyHunter,cmd:bodyCmd};
  const b=map[key](t);
  node.className='node';
  let state = forceState || (b.statCls==='run'?'run': (b.html||b.stat==='已跳过'||b.stat==='AUTO-CLOSE')?(b.statCls==='skip'?'skip':'done'):'');
  if(state) node.classList.add(state);
  $('#right-'+key).innerHTML = (b.model&&b.model!=='—'&&b.model!=='skip'?`<span class="model-tag${b.esc?' esc':''}">${b.model}</span>`:'')
    + (key==='cmd'?`<span class="model-tag" style="background:#1a1622;border-color:#2e2640;color:#b9a7d6">人工 · 0 Token</span>`:'')
    + `<span class="stat-pill ${b.statCls}">${b.stat}</span>`;
  $('#ameta-'+key).textContent = b.meta||'';
  $('#abody-'+key).innerHTML = b.html||'';
  // 触发评分条动画
  requestAnimationFrame(()=>document.querySelectorAll('#nd-'+key+' .bar > i').forEach(i=>{if(i.dataset.w)i.style.width=i.dataset.w+'%'}));
}
function paintFinal(t){
  ['intel','tier1','hunter','cmd'].forEach(k=>{
    // 处理中工单：未到的阶段保持「排队」灰态
    if(t.status==='processing'){
      const order={intel:0,tier1:1,hunter:2,cmd:3};
      const cur=order[t.stage];
      if(order[k]<cur) paintNode(k,t,'done');
      else if(order[k]===cur) paintNode(k,t,'run');
      else { const node=$('#nd-'+k); node.className='node';
        $('#right-'+k).innerHTML=`<span class="stat-pill skip">排队</span>`; $('#ameta-'+k).textContent='等待执行'; }
      return;
    }
    paintNode(k,t);
  });
  const ib=$('#intelbar'); if(ib&&ib.dataset.w) requestAnimationFrame(()=>ib.style.width=ib.dataset.w+'%');
}

/* ===================== 「重新 AI 分析」回放 ===================== */
let wsk=0;
function wslog(ev,kv,cls){
  if($('#wsmini .muted')) $('#wsmini').innerHTML='';
  wsk+=1;
  const line=document.createElement('div'); line.className='wsline';
  const ss=('0'+Math.min(59,Math.floor(wsk*1.7))).slice(-2);
  line.innerHTML=`<span class="t">10:24:${ss}</span> <span class="ev ${cls||''}">${ev}</span> <span class="muted">${esc(kv||'')}</span>`;
  $('#wsmini').appendChild(line); $('#wsmini').scrollTop=$('#wsmini').scrollHeight;
}
function P(fn,d){const id=setTimeout(fn,d*SPEED);playTimers.push(id)}
function setRunning(key){
  const node=$('#nd-'+key); node.className='node run';
  $('#right-'+key).innerHTML=`<span class="stat-pill run">执行中…</span>`;
  $('#ameta-'+key).textContent='模型推理中…'; $('#abody-'+key).innerHTML='';
}
function setQueued(key){
  const node=$('#nd-'+key); node.className='node';
  $('#right-'+key).innerHTML=`<span class="stat-pill skip">排队</span>`; $('#ameta-'+key).textContent='等待执行'; $('#abody-'+key).innerHTML='';
}
function playPipeline(t){
  clearPlay(); wsk=0;
  $('#wsmini').innerHTML=''; ['intel','tier1','hunter','cmd'].forEach(setQueued);
  const btn=$('#reAnalyze'); if(btn){btn.disabled=true;}
  const skipIntel = !t.intel || t.intel.model==='skip';
  const skipHunter = t.hunter && t.hunter.skip;
  let tm=200;
  P(()=>wslog('ticket_start','ticket_id='+t.id,'s'),tm); tm+=700;
  // Intel
  if(skipIntel){ P(()=>{paintNode('intel',t,'skip');wslog('agent_skip','agent=threat-intel · 无公网 IOC');},tm); tm+=700; }
  else { P(()=>{setRunning('intel');wslog('agent_start','agent=threat-intel','s')},tm); tm+=1500;
         P(()=>{paintNode('intel',t,'done');wslog('agent_complete','agent=threat-intel'+(t.intel.esc?' · escalated':''),'c')},tm); tm+=600; }
  // Tier1
  P(()=>{setRunning('tier1');wslog('agent_start','agent=tier1-soc','s')},tm); tm+=1600;
  P(()=>{paintNode('tier1',t,'done');wslog('agent_complete','agent=tier1-soc','c')},tm); tm+=700;
  // Hunter
  if(skipHunter){ P(()=>{paintNode('hunter',t,'skip');wslog('agent_skip','agent=tier2-hunter · 规则 FP 自动关闭')},tm); tm+=700; }
  else { P(()=>{setRunning('hunter');wslog('agent_start','agent=tier2-hunter','s')},tm); tm+=1900;
         if(t.hunter&&t.hunter.esc){ P(()=>{$('#ameta-hunter').textContent='置信 <70 · 升级 opus-4-8 复核…'},tm-700); }
         P(()=>{paintNode('hunter',t,'done');wslog('agent_complete','agent=tier2-hunter'+(t.hunter&&t.hunter.esc?' · escalated=opus-4-8':''),'c')},tm); tm+=700; }
  // Commander
  P(()=>{paintNode('cmd',t, t.cmd&&t.cmd.autoclose?'skip':'done');
    const status = t.cmd&&t.cmd.autoclose?'closed_false_positive':(t.status==='pending_approval'?'pending_approval':'completed');
    wslog('ticket_complete','status='+status+(t.grade?' grade='+t.grade:''),'c');
    if(btn) btn.disabled=false;
  },tm);
}

/* 单行系统提示词：## 标题染蓝、**加粗**、`代码` 高亮 */
function promptLine(raw,i){
  let s;
  if(/^##\s+/.test(raw)) s = '<span class="ph">'+esc(raw.replace(/^##\s+/,''))+'</span>';
  else s = esc(raw).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<span class="pc">$1</span>');
  return `<div class="prow"><span class="pn">${i+1}</span><span class="pt">${s||'&nbsp;'}</span></div>`;
}

function bindCtrl(){
  const tg=$('#notesToggle');
  if(tg){ if(document.body.classList.contains('notes-on')) tg.classList.add('on');
    tg.addEventListener('click',()=>{document.body.classList.toggle('notes-on');tg.classList.toggle('on')}); }
  const sp=$('#speed'); if(sp){ sp.value=String(SPEED); sp.addEventListener('change',e=>SPEED=parseFloat(e.target.value)); }
}

let toastTimer;
function toast(msg){
  const el=$('#toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
