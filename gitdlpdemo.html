<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitDLP 公开泄露检测台 · 带注释的交互式演示</title>
<style>
/* ============================================================
   GitDLP — 公开 GitHub 敏感数据泄露检测系统
   交互式演示（内容严格对齐实际功能；样式仿 UserAct demo 脚手架）
   设计令牌取自 GitDLP theme.js · GLP 绿
   ============================================================ */
:root{
  --canvas:#F5FAF6; --surface:#FFFFFF; --surface-2:#FCFDFE; --surface-sunken:#F0F4F1; --softer:#F4F9F5;
  --border:#E2ECE5; --border-strong:#C8D8CE; --hairline:#EEF4F0; --linefaint:#E2ECE5;
  --ink-900:#15241C; --ink-800:#2A3D33; --ink-700:#3F5449; --ink-600:#5F7468;
  --ink-500:#6B7D72; --ink-400:#8AA295; --ink-300:#B4C4BA;
  --primary:#1A8A55; --primary-700:#0F5C39; --primary-600:#15885F; --green-ink:#123B28;
  --primary-soft:#E0F0E6; --primary-soft-2:#F0F8F4; --primary-ink:#0F5C39;
  --risk-high:#C23A2F; --risk-high-soft:#FBE4E1; --risk-high-ink:#9E2A21;
  --risk-med:#B98207; --risk-med-soft:#FBF3D8; --risk-med-ink:#8A5A00;
  --ok:#1A8A55; --ok-soft:#E7F4EC; --warn:#B98207; --warn-soft:#FBF3D8; --warn-deep:#A5710A;
  --orange:#C2621F; --orange-soft:#FAE6D6; --orange-ink:#A5510F; --orange-deep:#A5510F;
  --info:#2B6BB5; --info-soft:#E4EEFB; --info-ink:#235B9C;
  --neutral:#7A8C81; --neutral-bg:#EEF1EF;
  --cat-secret:#C23A2F; --cat-secret-soft:#FBE4E1; --cat-pii:#C2621F; --cat-pii-soft:#FAE6D6;
  --cat-source:#2B6BB5; --cat-source-soft:#E4EEFB; --cat-config:#B98207; --cat-config-soft:#FBF3D8;
  --cat-other:#6B7D72; --cat-other-soft:#F0F4F1;
  --font-sans:"Manrope","Noto Sans SC","Source Han Sans SC","Microsoft YaHei UI","Microsoft YaHei",sans-serif;
  --font-mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
  --r-sm:4px; --r-md:6px; --r-lg:8px; --r-xl:12px; --r-2xl:16px;
  --shadow-xs:0 1px 2px rgba(20,80,50,.05); --shadow-sm:0 1px 3px rgba(20,80,50,.08),0 0 0 1px rgba(20,80,50,.03);
  --shadow-soft:0 6px 18px rgba(20,80,50,.05); --shadow-card:0 10px 30px rgba(20,80,50,.06);
  --shadow-md:0 4px 12px rgba(20,80,50,.10),0 0 0 1px rgba(20,80,50,.04); --shadow-lg:0 8px 24px rgba(20,80,50,.14);
  --maxw:1200px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;color:var(--ink-800);font-family:var(--font-sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;}
body{background:linear-gradient(180deg,#F5FAF6 0%,#EAF4EC 100%);}
button{font-family:inherit;cursor:pointer;}input{font-family:inherit;}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1;}
::selection{background:var(--primary-soft);}
@keyframes g-fade{from{opacity:0}to{opacity:1}}
@keyframes g-fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes g-spin{to{transform:rotate(360deg)}}
@keyframes anno-ping{0%{box-shadow:0 0 0 0 rgba(26,138,85,.5)}70%{box-shadow:0 0 0 8px rgba(26,138,85,0)}100%{box-shadow:0 0 0 0 rgba(26,138,85,0)}}
.spin{animation:g-spin .9s linear infinite;display:inline-block;}
.fade{animation:g-fade-up .35s ease;}
svg{flex:none;}

/* demo chrome */
.demo-bar{position:sticky;top:0;z-index:80;display:flex;align-items:center;gap:18px;padding:10px 20px;background:#0c1f18;color:#dcefe3;border-bottom:1px solid #163b2c;flex-wrap:wrap;}
.demo-bar .brandwrap{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;color:#fff;}
.demo-bar .brandwrap .badge{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:999px;background:rgba(34,171,118,.2);color:#9ff0c8;font-size:10.5px;font-weight:700;letter-spacing:.06em;}
.stepper{display:flex;align-items:center;gap:6px;margin:0 auto;}
.stepper button{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;background:transparent;color:#88b6a2;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;transition:all .14s;}
.stepper button .num{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;background:rgba(255,255,255,.08);color:#9ff0c8;}
.stepper button.on{background:rgba(34,171,118,.16);color:#eafff4;border-color:rgba(34,171,118,.4);}
.stepper button.on .num{background:var(--primary);color:#fff;}
.stepper .arrow{color:#3c5f4f;font-size:13px;}
.demo-actions{display:flex;align-items:center;gap:10px;}
.demo-actions .toggle{display:inline-flex;align-items:center;gap:8px;border:1px solid #2a5443;background:rgba(255,255,255,.04);color:#cdeeda;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:999px;}
.demo-actions .toggle.on{background:var(--primary);border-color:var(--primary-600);color:#fff;}
.demo-actions .toggle .sw{width:30px;height:16px;border-radius:999px;background:#28473a;position:relative;transition:background .15s;}
.demo-actions .toggle.on .sw{background:#0c3b27;}
.demo-actions .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#9bbcae;transition:all .16s;}
.demo-actions .toggle.on .sw::after{left:16px;background:#fff;}
.demo-actions .ghost{border:1px solid #2a5443;background:transparent;color:#a9d2c0;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;}
.demo-actions .ghost:hover{background:rgba(255,255,255,.05);color:#fff;}

/* topnav */
.g-topnav{position:sticky;top:49px;z-index:40;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--linefaint);}
.g-topnav .inner{width:var(--maxw);max-width:92vw;margin:0 auto;display:flex;align-items:center;gap:16px;height:72px;}
.brandmark{display:flex;align-items:center;gap:12px;cursor:pointer;}
.brandmark .glyph{width:44px;height:44px;border-radius:13px;flex:none;background:linear-gradient(155deg,var(--primary),var(--primary-700));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(15,95,57,.28);color:#fff;font-family:var(--font-mono);font-weight:600;font-size:18px;letter-spacing:-1px;}
.brandmark .t1{font-weight:800;font-size:22px;color:var(--green-ink);line-height:1.05;letter-spacing:-.3px;}
.brandmark .t2{font-size:12px;color:var(--ink-500);font-weight:500;}
.g-topnav nav{display:flex;align-items:center;gap:6px;margin:0 auto;}
.g-topnav nav button{border:none;background:transparent;color:var(--ink-800);font-weight:700;font-size:15px;padding:8px 16px;border-radius:999px;white-space:nowrap;}
.g-topnav nav button.on{background:linear-gradient(150deg,var(--primary),var(--primary-700));color:#fff;}
.tokpill{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:11px;background:var(--ok-soft);color:var(--ok);font-size:13px;font-weight:700;}
.tokpill .d{width:8px;height:8px;border-radius:50%;background:var(--ok);}
.btn-primary{display:inline-flex;align-items:center;gap:7px;border:none;background:linear-gradient(150deg,var(--primary),var(--primary-700));color:#fff;padding:11px 20px;border-radius:12px;font-weight:700;font-size:14px;white-space:nowrap;box-shadow:0 6px 14px rgba(15,92,57,.25);}
.btn-ghost{border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-700);padding:11px 18px;border-radius:12px;font-weight:700;font-size:14px;}

/* home / search */
.g-home{background:radial-gradient(circle at 10% 18%,rgba(26,138,85,.10),transparent 26%),linear-gradient(180deg,#F6FBF7,#EEF6F0);}
.wrap{width:var(--maxw);max-width:92vw;margin:0 auto;}
.g-home-main{display:grid;grid-template-columns:1fr 500px;gap:60px;align-items:start;padding:56px 0 80px;}
.kicker{display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:999px;background:var(--primary-soft);color:var(--primary-ink);font-weight:700;font-size:13px;margin-bottom:24px;}
h1.hero{font-size:52px;line-height:1.08;font-weight:900;letter-spacing:-1.5px;color:var(--green-ink);margin:0 0 22px;}
h1.hero .g{color:var(--primary);}
p.lede{font-size:18px;line-height:1.6;color:var(--ink-700);max-width:560px;margin:0 0 34px;}
.searchbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card);}
.searchbox .mag{width:44px;height:44px;border-radius:12px;background:var(--softer);display:grid;place-items:center;color:var(--ink-400);flex:none;}
.searchbox input{flex:1;border:none;outline:none;font-size:16px;color:var(--ink-900);background:transparent;}
.searchbox .go{padding:13px 24px;border-radius:12px;background:var(--primary-soft);color:var(--primary-700);border:none;font-weight:700;font-size:15px;display:inline-flex;align-items:center;gap:8px;}
.g-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.g-tags span{font-size:12.5px;color:var(--ink-500);background:var(--surface);border:1px solid var(--linefaint);padding:5px 12px;border-radius:999px;}
.notice{margin-top:14px;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;flex-wrap:wrap;font-size:13px;line-height:1.5;}
.check{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;flex:none;}
.check .box{width:15px;height:15px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.fieldlabel{font-size:12.5px;font-weight:600;color:var(--ink-400);}
.rangeseg{display:inline-flex;gap:4px;background:#edf1ed;padding:5px;border-radius:14px;flex-wrap:wrap;}
.rangeseg button{border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;background:transparent;color:var(--ink-600);}
.rangeseg button.on{background:#fff;color:var(--primary-700);box-shadow:0 2px 8px rgba(20,80,50,.12);}
.chipbtn{padding:8px 16px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--linefaint);background:var(--surface);color:#3f5449;}
.chipbtn.on{background:var(--primary-soft);border-color:#b7dcc4;color:var(--primary-ink);}
/* evidence card */
.g-ev-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;box-shadow:0 18px 44px rgba(20,80,50,.10);}
.g-ev-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;}
.g-ev-head span{font-weight:800;font-size:20px;color:var(--green-ink);}
.g-ev-head b{font-size:11px;font-weight:700;color:#9fb3a6;letter-spacing:1px;}
.g-ev-tier{border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.g-ev-tier .bar{width:5px;align-self:stretch;border-radius:999px;flex:none;}
.g-ev-tier strong{display:block;font-weight:800;font-size:16px;margin-bottom:3px;}
.g-ev-tier p{margin:0;font-size:13px;color:var(--ink-700);line-height:1.5;}
.g-ev-tier .no{font-family:var(--font-mono);font-weight:800;font-size:30px;opacity:.45;}
.home-foot{padding:16px 0 34px;text-align:center;color:var(--ink-400);font-size:12px;}
/* expansion panel */
.exp-trigger{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:12px;background:var(--surface);border:1px dashed var(--border);font-size:13.5px;font-weight:700;color:var(--primary-700);cursor:pointer;}
.exp-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow-card);}
.cand{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;cursor:pointer;border:1px solid var(--linefaint);background:#fafbfa;}
.cand.on{background:#f2f8f4;border-color:#c8e2d3;}
.cand .rad{width:17px;height:17px;flex:none;border-radius:5px;border:1.5px solid #c3d3ca;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:900;}
.cand.on .rad{background:var(--primary);border-color:var(--primary);}
.breadthtag{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:999px;}
.recent-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:#fff;border:1px solid var(--linefaint);cursor:pointer;font-size:13px;}

/* workbench */
.pageband{padding:34px 0 70px;}
.wbhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
.eyebrow{font-size:12px;font-weight:800;color:var(--primary);letter-spacing:1px;margin-bottom:6px;}
.h2{font-size:34px;font-weight:900;color:var(--green-ink);letter-spacing:-.5px;margin:0;}
.statstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.statcard{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow-soft);}
.statcard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.statcard .lbl{font-size:13.5px;color:var(--ink-500);font-weight:700;}
.statcard .dot{width:10px;height:10px;border-radius:50%;}
.statcard .val{font-size:32px;font-weight:800;color:var(--ink-900);font-family:var(--font-mono);line-height:1;}
.statcard .delta{font-size:12.5px;font-weight:700;margin-top:6px;}
.seg{display:inline-flex;background:#fff;border:1px solid var(--linefaint);border-radius:12px;padding:5px;gap:3px;flex-wrap:wrap;}
.seg button{padding:9px 16px;border-radius:9px;font-weight:700;font-size:13.5px;border:none;background:transparent;color:#3f5449;}
.seg button.on{background:var(--primary);color:#fff;}
.subseg{display:inline-flex;background:#eef2ef;border-radius:11px;padding:4px;gap:3px;}
.subseg button{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;border:none;background:transparent;color:var(--ink-600);}
.subseg button.on{background:#fff;color:var(--primary-700);box-shadow:0 1px 4px rgba(20,80,50,.12);}
.ftoggle{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;cursor:pointer;background:#fff;border:1px solid var(--linefaint);font-size:13px;font-weight:700;color:#3f5449;}
.ftoggle.on{background:var(--primary-soft);border-color:#b7dcc4;color:var(--primary-ink);}
.ftoggle .box{width:15px;height:15px;border-radius:5px;border:1.5px solid #c3d3ca;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:900;}
.ftoggle.on .box{background:var(--primary);border-color:var(--primary);}
.wbtable{background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-card);}
.wbrow{display:grid;grid-template-columns:88px 1.7fr 1.25fr 1fr 118px 92px 40px;gap:16px;padding:16px 24px;align-items:center;}
.wbhd{background:var(--softer);border-bottom:1px solid var(--border);font-size:12.5px;font-weight:800;color:var(--ink-500);letter-spacing:.3px;}
.wbtr{border-bottom:1px solid var(--hairline);cursor:pointer;transition:background .12s;text-align:left;background:none;border-left:none;border-right:none;border-top:none;width:100%;}
.wbtr:hover{background:var(--softer);}
.scorebadge{width:56px;height:56px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none;}
.scorebadge .n{font-size:22px;font-weight:800;font-family:var(--font-mono);line-height:1;}
.scorebadge .s{font-size:9px;font-weight:800;margin-top:1px;letter-spacing:.5px;}
.catpill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;}
.valpill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;font-size:12.5px;font-weight:700;}
.autofetch{background:#fff;border:1px solid #ecdca6;border-radius:14px;padding:14px 18px;box-shadow:var(--shadow-soft);margin-bottom:18px;}
.pbar{height:8px;background:var(--surface-sunken);border-radius:6px;overflow:hidden;}
.pbar>div{height:100%;background:linear-gradient(90deg,var(--primary-600),var(--primary-700));border-radius:6px;transition:width .3s;}
.narrowbanner{background:var(--warn-soft);border:1px solid #ecdca6;border-radius:14px;padding:15px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}

/* detail */
.backlink{display:inline-flex;align-items:center;gap:7px;color:var(--ink-500);font-weight:700;font-size:14px;cursor:pointer;margin-bottom:18px;}
.dheadcard{background:#fff;border:1px solid var(--border);border-radius:20px;padding:26px 30px;box-shadow:var(--shadow-card);margin-bottom:20px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
.dbig{width:92px;height:92px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none;}
.dbig .n{font-size:40px;font-weight:800;font-family:var(--font-mono);line-height:1;}
.dbig .s{font-size:11px;font-weight:800;letter-spacing:.5px;}
.dgrid{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start;}
.tier{background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:16px;}
.tier .th{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-left:5px solid;}
.tier .th .tt{font-weight:800;font-size:17px;}
.tier .th .rt{font-size:12px;font-weight:700;}
.tier .tb{padding:20px 22px;}
.codebox{background:#132019;color:#c7d6cd;border-radius:12px;padding:16px 18px;font-family:var(--font-mono);font-size:13px;line-height:1.9;overflow:auto;max-height:260px;}
.codebox mark{background:rgba(194,58,47,.30);color:#ff8f84;border-radius:3px;padding:0 2px;}
.codebox mark.m{background:rgba(224,184,74,.28);color:#f0d98a;}
.meta{min-width:0;}.meta .k{font-size:12px;color:#8aa295;font-weight:600;}.meta .v{font-weight:700;font-size:13.5px;color:var(--ink-800);font-family:var(--font-mono);word-break:break-all;}
.dial{width:120px;height:120px;border-radius:50%;display:grid;place-items:center;flex:none;}
.dial .in{width:96px;height:96px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.minibox{background:var(--softer);border-radius:10px;padding:12px 14px;}
.minibox .k{font-size:12px;color:#8aa295;font-weight:600;}.minibox .v{font-weight:700;font-size:13.5px;}
.spreadstat{background:var(--softer);border-radius:12px;padding:14px;text-align:center;}
.spreadstat .n{font-size:26px;font-weight:800;font-family:var(--font-mono);}
.spreadstat .k{font-size:12px;color:var(--ink-500);font-weight:600;}
.panel{background:#fff;border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:var(--shadow-card);margin-bottom:16px;}
.factor{margin-bottom:13px;}
.factor .fl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13.5px;}
.factor .fbar{height:8px;background:var(--neutral-bg);border-radius:6px;overflow:hidden;}
.factor .fbar>div{height:100%;border-radius:6px;}
.runstep{display:flex;gap:12px;align-items:flex-start;padding:13px 14px;border-radius:12px;margin-bottom:10px;}
.runstep .n{width:24px;height:24px;border-radius:50%;color:#fff;font-size:12px;font-weight:800;display:grid;place-items:center;flex:none;}
.iconbtn{display:grid;place-items:center;width:34px;height:34px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--ink-600);flex:none;}

/* pages */
.g-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-card);}
.g-table th{background:var(--softer);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-500);text-align:left;padding:14px;}
.g-table td{border-bottom:1px solid var(--hairline);padding:14px;font-size:12.5px;color:var(--ink-700);vertical-align:top;}
.g-table tr:hover td{background:var(--softer);}
.sevpill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;}
.acct-card{background:#fff;border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-soft);}
.src-card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-soft);padding:16px;}

/* annotation */
.anno-pin{display:none;}
body.anno-on .anno-pin{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:800;vertical-align:middle;margin:0 3px;flex:none;box-shadow:0 2px 6px -1px rgba(26,138,85,.6);animation:anno-ping 2.4s infinite;cursor:pointer;position:relative;z-index:5;}

/* ============================ 工具 ============================ */
const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];
function pin(k,corner){return `<span class="anno-pin${corner?' corner':''}" data-anno="${k}">${ANNOS[k].n}</span>`;}
function catPill(c){const m=CAT[c];return `<span class="catpill" style="background:var(--cat-${m.c}-soft);color:var(--cat-${m.c})">${m.label}</span>`;}
function avatar(name,size){const i=(name||'?').trim().charAt(0).toUpperCase();let h=0;for(const ch of name)h=(h*31+ch.charCodeAt(0))%360;
  return `<div style="width:${size}px;height:${size}px;border-radius:${size*0.28}px;flex:none;display:grid;place-items:center;color:#fff;font-weight:700;font-size:${size*0.4}px;background:linear-gradient(150deg,hsl(${h} 45% 46%),hsl(${(h+30)%360} 42% 38%))">${i}</div>`;}
function valColor(v){return v==="仍生效"?"var(--risk-high)":v==="已失效"?"var(--ok)":"var(--neutral)";}
function valBg(v){return v==="仍生效"?"var(--risk-high-soft)":v==="已失效"?"var(--ok-soft)":"var(--neutral-bg)";}

function wbFiltered(){let base=STATE.tab==="全部"?HITS:HITS.filter(h=>CAT[h.cat].label===STATE.tab||(STATE.tab==="PII / 客户"&&h.cat==="pii"));

  const text=["【GitDLP 泄露处置工单】",`命中编号：${h.id}`,`风险分：${h.score}（${s.label}）`,`类型：${h.type}`,`仓库：${h.repo}`,`文件：${h.path} @ ${h.commit}`,`关联账号：${h.account}（推测，仅供研判，不作个人指认）`,`密钥有效性：${h.validity}（前端不做真实探测）`,`命中证据（脱敏）：${ev}`,`证据 SHA-256：见详情页实时计算`,"","建议处置（Runbook）：",...rb.map((r,i)=>`  ${i+1}. ${r}`),"","备注：遵循通知最小化，正文不含完整密钥/PII 原文。"].join("\n");
  $("#overlay").innerHTML=`<div class="scrim" id="tScrim"><div class="intro" style="max-width:640px"><div class="ih"><h2 style="font-size:18px">工单草稿 · 可复制</h2><p>脱敏内容，粘贴到 Jira / ServiceNow 等工单系统即可</p></div>

}

    <tbody>${list.map(h=>{const s=sev(h.score);return `<tr class="hitrow" data-hit="${h.id}" style="cursor:pointer">
      <td><span style="display:inline-flex;flex-direction:column;align-items:center;padding:6px 8px;border-radius:10px;background:${s.soft}"><span class="mono" style="font-size:18px;font-weight:800;color:${s.c}">${h.score}</span><span style="font-size:10px;font-weight:800;color:${s.c}">${s.label}</span></span></td>
      <td><div style="display:flex;align-items:center;gap:6px">${icon(CAT[h.cat].icon,14,2,`var(--cat-${CAT[h.cat].c})`)}<span style="font-weight:700;color:var(--ink-900)">${h.type}</span></div><div style="margin-top:4px">${catPill(h.cat)}${h.isNew?' <span class="catpill" style="background:var(--primary);color:#fff">🆕 新增</span>':''}</div></td>
      <td class="mono" style="max-width:280px"><div style="color:var(--ink-800);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.repo}</div><div style="color:#93a69b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.path}</div></td>
      <td class="mono" style="color:var(--ink-600)">${h.account}</td>
      <td><span style="font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--surface-sunken);color:var(--ink-600)">${h.status}</span></td>
      <td style="text-align:right;color:#9fb3a6">→</td></tr>`;}).join("")}</tbody></table></div>`;
  $$(".hitrow").forEach(b=>b.onclick=()=>{STATE.detailId=b.dataset.hit;go("detail");});bindView();
}
function renderAudit(){
  const counts={total:AUDIT.length,scan:AUDIT.filter(a=>a.cat==="扫描").length,ev:AUDIT.filter(a=>a.cat==="证据").length,disp:AUDIT.filter(a=>a.cat==="工单"||a.cat==="处置").length};
  $("#app").innerHTML=`${topnav("audit")}<div class="wrap pageband fade">
    ${pageHead("shield","操作审计日志","审计追踪 · 扫描发起 / 证据访问 / 有效性验证 / 工单处置 / 配置变更全量留痕；演示态持久化于本浏览器，生产须写入防篡改的独立审计存储","a-audit")}
    <div class="statstrip">${[["审计条目总数",counts.total,"var(--primary)"],["扫描发起",counts.scan,"var(--ok)"],["证据访问",counts.ev,"var(--warn-deep)"],["工单 / 处置",counts.disp,"var(--risk-high)"]].map(([l,v,c])=>`<div class="statcard"><div class="top"><div class="lbl">${l}</div><div class="dot" style="background:${c}"></div></div><div class="val">${v}</div><div class="delta" style="color:var(--ink-400)"> </div></div>`).join("")}</div>
    <div class="seg" style="margin-bottom:16px">${["全部","扫描","证据","验证","工单","配置"].map((c,i)=>`<button class="${i===0?'on':''}">${c}</button>`).join("")}</div>
    <table class="g-table"><thead><tr><th>时间</th><th>操作</th><th>对象 / 详情</th><th>操作人</th></tr></thead>
    <tbody>${AUDIT.map(a=>{const st=AUDIT_STYLE[a.action]||["•","var(--ink-600)","var(--surface-sunken)"];return `<tr>
      <td class="mono" style="color:var(--ink-500);white-space:nowrap">${a.at}</td>
      <td><span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:${st[2]};color:${st[1]};font-size:12.5px;font-weight:700;white-space:nowrap">${st[0]} ${a.action}</span></td>
      <td><div style="font-weight:700;color:var(--ink-900)">${a.target}</div><div style="font-size:12.5px;color:var(--ink-500);margin-top:2px;line-height:1.5">${a.detail}</div></td>
      <td style="font-weight:600">${a.actor}</td></tr>`;}).join("")}</tbody></table>
    <div style="margin-top:14px;padding:14px 18px;background:var(--risk-high-soft);border-radius:12px;font-size:13px;color:#a32a20;font-weight:600;line-height:1.6">通知最小化原则：审计详情中不记录完整密钥/PII 原文，仅记录「谁、何时、访问了哪条命中」。敏感原文的查看行为本身被记录，但原文不进入日志。</div>
    </div>`;bindView();
}

/* ============================ toast / 注释 ============================ */
let toastT=null;function toast(msg){let t=$("#toast");if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:120;background:#0c1f18;color:#e7f6ee;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);max-width:90vw;display:flex;align-items:center;gap:9px";document.body.appendChild(t);}t.innerHTML=icon("check",16,2.4,"#9ff0c8")+msg;t.style.opacity="1";clearTimeout(toastT);toastT=setTimeout(()=>{t.style.transition="opacity .4s";t.style.opacity="0";},2600);}
let curAnno=null;
function bindAnno(){document.body.addEventListener("click",e=>{const p=e.target.closest(".anno-pin");if(p){e.stopPropagation();showAnno(p.dataset.anno,p);return;}if(!e.target.closest(".anno-pop"))hideAnno();});window.addEventListener("scroll",hideAnno,true);}
function showAnno(k,el){const a=ANNOS[k];if(!a)return;hideAnno();const p=document.createElement("div");p.className="anno-pop";
  p.innerHTML=`<div class="ah"><span class="n">${a.n}</span><span class="ti">${a.title}</span><button class="closep">${icon("x",16)}</button></div><div class="ab">${a.body}<div class="src">${icon("layers",12)}${a.src}</div></div>`;
  document.body.appendChild(p);const r=el.getBoundingClientRect(),pw=p.offsetWidth,ph=p.offsetHeight;let left=r.left+r.width/2-pw/2,top=r.bottom+10;
  if(left<8)left=8;if(left+pw>innerWidth-8)left=innerWidth-pw-8;if(top+ph>innerHeight-8)top=r.top-ph-10;if(top<8)top=8;p.style.left=left+"px";p.style.top=top+"px";p.querySelector(".closep").onclick=hideAnno;curAnno=p;}
function hideAnno(){if(curAnno){curAnno.remove();curAnno=null;}}

/* ============================ 路由 ============================ */
function go(v){stopAf();STATE.view=v;render();scrollTo(0,0);}
function render(){hideAnno();$("#overlay").innerHTML="";
  if(STATE.view==="search")renderSearch();
  else if(STATE.view==="workbench")renderWorkbench();
  else if(STATE.view==="detail")renderDetail();
  else if(STATE.view==="history")renderHistory();
  else if(STATE.view==="accounts")renderAccounts();
  else if(STATE.view==="hits")renderHits();
  else if(STATE.view==="audit")renderAudit();
  syncStepper();}
function bindView(){$$("[data-view]").forEach(b=>b.onclick=()=>go(b.dataset.view));}
function syncStepper(){const map={search:"search",workbench:"workbench",detail:"detail"};$$("#stepper button").forEach(b=>b.classList.toggle("on",map[STATE.view]===b.dataset.step));}

$("#stepper").onclick=e=>{const b=e.target.closest("[data-step]");if(b)go(b.dataset.step);};
$("#annoToggle").onclick=()=>{const on=document.body.classList.toggle("anno-on");$("#annoToggle").classList.toggle("on",on);if(!on)hideAnno();};
$("#restartBtn").onclick=()=>{STATE.view="search";STATE.tab="全部";STATE.minScore=0;go("search");};
$("#introBtn").onclick=showIntro;
function showIntro(){$("#overlay").innerHTML=`<div class="scrim" id="iScrim"><div class="intro"><div class="ih"><h2>GitDLP 交互式演示</h2><p>公开 GitHub 敏感数据泄露检测系统 — 调用 GitHub 代码搜索，运行密钥/PII 检测引擎，生成带证据的可解释风险研判。本演示为完全虚构的示例数据。</p></div>
  <div class="ib">
    <div class="step"><span class="n">1</span><div><div class="tt">搜寻台</div><div class="dd">输入目标，设置域名精确 / 降噪 / 类型 / 排查语境；可选内联「扩展搜索」把域名炸开成候选。</div></div></div>
    <div class="step"><span class="n">2</span><div><div class="tt">检测工作台</div><div class="dd">统计条 + 类型/降噪筛选 + 命中队列表格；自动渐进取全（取满→分片）；结果过多可一键精确重搜。</div></div></div>
    <div class="step"><span class="n">3</span><div><div class="tt">命中详情</div><div class="dd">四层证据（快照+实时SHA-256、有效性、扩散、账号）+ 可解释评分 + 处置 Runbook + 可复制工单。</div></div></div>
    <div class="step"><span class="n">▦</span><div><div class="tt">顶部五个板块</div><div class="dd">搜寻台 / 查询历史 / 账号线索 / 命中列表 / 审计追踪，均可点击。</div></div></div>
    <div class="step"><span class="n">★</span><div><div class="tt">注释模式</div><div class="dd">界面上闪烁的绿色数字 ❶❷❸ 可点击，查看每个区域对应的真实代码文件与合规边界。</div></div></div>
  </div><div class="if"><button class="btn-primary" id="iStart">开始体验 ${icon("arrowR",16,2,"#fff")}</button></div></div></div>`;
  $("#iScrim").onclick=e=>{if(e.target.id==="iScrim")$("#overlay").innerHTML="";};$("#iStart").onclick=()=>$("#overlay").innerHTML="";}

bindAnno();render();showIntro();
</script>
</body>
